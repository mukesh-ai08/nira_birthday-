<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Nira! 🐰❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="floating-container"></div>

  <div class="container">
    <h1 class="title">Happy 18th Birthday,<br><span class="name">Nira</span>! 🎂✨</h1>
    
    <div class="hero">
      <img src="hero.jpg" alt="Beautiful Nira" class="hero-img">
    </div>

    <div class="message-box">
      <p id="typewriter" class="message"></p>
    </div>

    <div class="special">
      <h2>🐰 You're Cute Rabbit🐰</h2>
      <p> Stay the same pure, strong, and beautiful soul </p>
    </div>

    <div class="dream">
      <h2>🌟 Your Big Dream 🌟</h2>
      <p>Whether you become an <strong>IAS Officer</strong> or a <strong>Doctor</strong>, I believe in you completely. You are smart, strong, and destined for greatness. I'll always support your dreams!</p>
    </div>

    <div class="gallery">
      <img src="photo1.jpg" alt="Memory 1">
      <img src="photo2.jpg" alt="Memory 2">
      <img src="photo3.jpg" alt="Memory 3">
    </div>

    <button onclick="launchSurprise()" class="surprise-btn">
      Click for My Special Surprise ❤️🐰
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
